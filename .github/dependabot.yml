version: 2

updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "wuesteon"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Group major updates separately for review
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
      # Group dev dependencies
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "wuesteon"
    labels:
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "ci"

  # Docker updates
  - package-ecosystem: "docker"
    directory: "/services/mana-auth"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "wuesteon"
    labels:
      - "docker"
      - "automated"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "docker"
    directory: "/apps/chat/apps/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "automated"

  - package-ecosystem: "docker"
    directory: "/apps/maerchenzauber/apps/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "automated"

  - package-ecosystem: "docker"
    directory: "/apps/cards/apps/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "automated"

  - package-ecosystem: "docker"
    directory: "/apps/news/apps/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "automated"
